사","parent":"2108454171","url":"https://wiki.daumkakao.com/pages/viewpage.action?pageId=2108454208"},{"id":"2108454719","title":"아이데이션","parent":"2108454171","url":"https://wiki.daumkakao.com/pages/viewpage.action?pageId=2108454719"},{"id":"2124383806","title":"99. 기타 (BM아이디어)","parent":"2103474803","url":"https://wiki.daumkakao.com/pages/viewpage.action?pageId=2124383806"}];
    const children = new Map();
    const byId = new Map(pages.map((page) => [page.id, page]));
    pages.forEach((page) => {
      const parent = page.parent || "__root__";
      if (!children.has(parent)) children.set(parent, []);
      children.get(parent).push(page);
    });

    const escapeHtml = (value) => value.replace(/[&<>"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[char]));
    const maxDepth = (id, depth = 1) => Math.max(depth, ...(children.get(id) || []).map((child) => maxDepth(child.id, depth + 1)));

    function renderNode(page, depth = 1) {
      const kids = children.get(page.id) || [];
      const li = document.createElement("li");
      li.dataset.title = page.title;
      li.dataset.id = page.id;
      li.dataset.depth = String(depth);

      if (kids.length) {
        const detail = document.createElement("details");
        detail.open = depth <= 3;
        detail.innerHTML = '<summary><span class="twisty" aria-hidden="true"></span><a class="title" href="' + page.url + '" target="_blank" rel="noreferrer">' + escapeHtml(page.title) + '</a><span class="meta">pageId ' + page.id + '</span></summary>';
        const ul = document.createElement("ul");
        kids.forEach((child) => ul.appendChild(renderNode(child, depth + 1)));
        detail.appendChild(ul);
        li.appendChild(detail);
      } else {
        li.innerHTML = '<div class="leaf"><a class="title" href="' + page.url + '" target="_blank" rel="noreferrer">' + escapeHtml(page.title) + '</a><span class="meta">pageId ' + page.id + '</span></div>';
      }

      return li;
    }

    const tree = document.querySelector("#tree");
    const roots = children.get("__root__") || [];
    roots.forEach((root) => tree.appendChild(renderNode(root)));
    document.querySelector("#total-count").textContent = pages.length.toLocaleString("ko-KR");
    document.querySelector("#child-count").textContent = (pages.length - roots.length).toLocaleString("ko-KR");
    document.querySelector("#max-depth").textContent = Math.max(...roots.map((root) => maxDepth(root.id))).toLocaleString("ko-KR");

    const search = document.querySelector("#search");
    const allDetails = () => Array.from(tree.querySelectorAll("details"));
    const allItems = () => Array.from(tree.querySelectorAll("li[data-title]"));

    document.querySelector("#expand-all").addEventListener("click", () => allDetails().forEach((detail) => { detail.open = true; }));
    document.querySelector("#collapse-all").addEventListener("click", () => allDetails().forEach((detail, index) => { detail.open = index === 0; }));

    search.addEventListener("input", () => {
      const query = search.value.trim().toLowerCase();
      allItems().forEach((item) => {
        item.classList.remove("hidden");
        item.querySelectorAll(".title").forEach((title) => { title.textContent = title.textContent; });
      });
      if (!query) return;
      allDetails().forEach((detail) => { detail.open = true; });
      allItems().forEach((item) => {
        const ownTitle = item.dataset.title.toLowerCase();
        const childMatch = Array.from(item.querySelectorAll("li[data-title]")).some((child) => child.dataset.title.toLowerCase().includes(query));
        if (!ownTitle.includes(query) && !childMatch) item.classList.add("hidden");
      });
      allItems().filter((item) => item.dataset.title.toLowerCase().includes(query)).forEach((item) => {
        const title = item.querySelector(".title");
        const escaped = query.replace(/[.*+?^${}()|[]\]/g, "\$&");
        const pattern = new RegExp('(' + escaped + ')', 'ig');
        title.innerHTML = title.textContent.replace(pattern, '<span class="match">$1</span>');
      });
    });
  </script>
