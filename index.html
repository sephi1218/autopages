<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>GitHub Test Page</title>
  <style>
    body {
      text-align: center;
      margin-top: 100px;
      font-family: Arial;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>🚀 GitHub 페이지 테스트</h1>
  <p>정상적으로 배포되면 이 페이지가 보입니다.</p>

  <button onclick="clickTest()">클릭 테스트</button>
  <p id="result"></p>

  <script>
    function clickTest() {
      document.getElementById("result").innerText = "정상 작동!";
      console.log("GitHub Pages JS OK");
    }
  </script>

</body>
</html>
